<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido | EternalLabs</title>
    <style>
        :root {
            --primary: #D4145A;
            --dark: #0F172A;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            padding: 40px;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(212, 20, 90, 0.1);
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        p { color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 40px; }
        .btn {
            background: white;
            color: var(--dark);
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 20, 90, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
        </div>
        <h1>Acceso Restringido</h1>
        <p>Tu cuenta en EternalLabs ha sido suspendida temporalmente debido a una infracción de nuestras políticas de seguridad o falta de validación de documentos.</p>
        <p style="font-size: 0.9rem;">Si crees que esto es un error, por favor contacta a soporte técnico en Bluefields o Bilwi.</p>
        <a href="mailto:soporte@eternallabs.com" class="btn">Contactar Soporte</a>
    </div>
</body>
</html>
