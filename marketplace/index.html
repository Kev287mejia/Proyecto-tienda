<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Marketplace | EternalLabs</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { padding-top: 100px; background-color: #FDFCF0; }
        .marketplace-container { max-width: 1400px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 320px 1fr; gap: 50px; }
        
        .filters-sidebar { position: sticky; top: 120px; height: fit-content; background: white; padding: 40px; border-radius: 40px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.03); }
        .filter-group { margin-bottom: 40px; }
        .filter-title { font-weight: 800; margin-bottom: 25px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); }
        .filter-option { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: var(--transition); }
        .filter-option:hover { color: var(--accent-orange); }
        .filter-option input { width: 20px; height: 20px; accent-color: var(--accent-orange); cursor: pointer; }
        
        .marketplace-header { margin-bottom: 50px; display: flex; justify-content: space-between; align-items: flex-end; }
        .marketplace-header h1 { font-size: 3rem; letter-spacing: -0.03em; }
        
        .sort-select { padding: 14px 24px; border-radius: 20px; border: 1px solid #E2E8F0; background: white; font-family: inherit; font-weight: 700; cursor: pointer; outline: none; transition: var(--transition); font-size: 0.9rem; }
        .sort-select:hover { border-color: var(--accent-orange); }

        header { background: rgba(255, 255, 255, 0.8) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 1.5rem 5% !important; }
        .logo { color: var(--text-main) !important; }
        .nav-icons { color: var(--text-main); font-weight: 700; }
        
        .btn-vender-sidebar { width: 100%; margin-top: 20px; justify-content: center; background: var(--primary-gradient); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: var(--transition); box-shadow: 0 10px 20px rgba(212, 20, 90, 0.2); }
        .btn-vender-sidebar:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 20, 90, 0.3); }

        @media (max-width: 1100px) {
            .marketplace-container { grid-template-columns: 1fr; }
            .filters-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <a href="../" class="logo" style="text-decoration: none;">
            <div class="logo-circle">E</div>
            <span>Plataforma <span class="gradient-text">Caribe</span></span>
        </a>
        <div class="nav-icons" style="display: flex; align-items: center; gap: 30px;">
            <a href="../" style="text-decoration: none; color: inherit; font-size: 0.95rem;">Inicio</a>
            <a href="#" style="text-decoration: none; color: var(--accent-orange); font-size: 0.95rem;">Marketplace</a>
            <div class="cart-icon-wrapper" onclick="toggleCart()" style="position: relative; cursor: pointer;">
                <i data-lucide="shopping-bag"></i>
                <span id="cart-count" class="cart-badge" style="position: absolute; top: -8px; right: -8px; background: var(--primary-gradient); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; border: 2px solid white;">0</span>
            </div>
            <i data-lucide="menu"></i>
        </div>
    </header>

    <div class="marketplace-container">
        <aside class="filters-sidebar">
            <div class="filter-group">
                <h3 class="filter-title">Categorías</h3>
                <label class="filter-option"><input type="checkbox" checked> <span>Todos los productos</span></label>
                <label class="filter-option"><input type="checkbox"> <span>Tecnología</span></label>
                <label class="filter-option"><input type="checkbox"> <span>Alimentos & Bebidas</span></label>
                <label class="filter-option"><input type="checkbox"> <span>Moda Caribeña</span></label>
                <label class="filter-option"><input type="checkbox"> <span>Artesanías locales</span></label>
            </div>

            <div class="filter-group">
                <h3 class="filter-title">Región</h3>
                <label class="filter-option"><input type="checkbox"> <span>RACCS (Bluefields)</span></label>
                <label class="filter-option"><input type="checkbox"> <span>RACCN (Bilwi)</span></label>
            </div>

            <div class="filter-group">
                <h3 class="filter-title">Rango de Precio</h3>
                <input type="range" style="width: 100%; margin-bottom: 15px; accent-color: var(--accent-orange);">
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">
                    <span>NIO 0</span>
                    <span>NIO 10,000+</span>
                </div>
            </div>

            <button class="btn-vender-sidebar" onclick="window.location.href='../register/'">
                <i data-lucide="store"></i> Vender en Plataforma
            </button>
        </aside>

        <main>
            <div class="marketplace-header">
                <div>
                    <h1>Todo el <span class="gradient-text">Caribe</span></h1>
                    <p style="color: var(--text-muted); font-weight: 600; font-size: 1.1rem; margin-top: 5px;">Descubre productos auténticos y verificados.</p>
                </div>
                <select class="sort-select">
                    <option>Más relevantes</option>
                    <option>Menor precio</option>
                    <option>Mayor precio</option>
                </select>
            </div>

            <div id="product-grid" class="product-grid">
                <!-- Inyectado por JS -->
            </div>
        </main>
    </div>

    <!-- Premium Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Tu Carrito</h3>
            <button onclick="toggleCart()" class="close-cart"><i data-lucide="x" style="width: 24px;"></i></button>
        </div>
        <div id="cart-view" style="flex: 1; display: flex; flex-direction: column;">
            <div id="cart-items" class="cart-items-container">
                <!-- Items list -->
            </div>
            <div class="cart-footer" id="cart-footer" style="display: none;">
                <div class="cart-total">
                    <span>Total del pedido</span>
                    <span id="cart-total-amount">NIO 0</span>
                </div>
                <button class="btn btn-primary" onclick="showCheckout()" style="width: 100%; justify-content: center; height: 60px; font-size: 1.1rem;">
                    Proceder al Pago <i data-lucide="arrow-right" style="margin-left: 10px;"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartUI();
        });

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const prods = [
                { id: 1, name: "Café Gourmet Caribe", price: 450, seller: "Granos de Oro", location: "Bluefields", image: "/caribbean_coffee_product_1778800497641.png" },
                { id: 2, name: "Artesanía en Coco", price: 320, seller: "Artesanos Bilwi", location: "Bilwi", image: "/media__1778799917034.jpg" },
                { id: 3, name: "Vestido Tropical", price: 950, seller: "Modas Maritza", location: "Bilwi", image: "/media__1778800601810.jpg" },
                { id: 4, name: "Chocolate Orgánico", price: 180, seller: "Cacao del Sur", location: "Bluefields", image: "/caribbean_hero_background_1778800043521.png" }
            ];

            grid.innerHTML = prods.map(p => `
                <div class="product-card" onclick="window.location.href='/product/?name=${encodeURIComponent(p.name)}&price=${p.price}&seller=${encodeURIComponent(p.seller)}'">
                    <div class="product-img">
                        <img src="${p.image}">
                        <div class="badge badge-new">NUEVO</div>
                    </div>
                    <div class="product-info">
                        <div class="product-meta">
                            <span><i data-lucide="map-pin" style="width:12px; vertical-align:middle; margin-right:4px;"></i>${p.location}</span>
                            <span style="color:#fbbf24;"><i data-lucide="star" style="width:12px; fill:currentColor; vertical-align:middle; margin-right:4px;"></i>4.9</span>
                        </div>
                        <h3 class="product-title">${p.name}</h3>
                        <p class="product-seller">por ${p.seller}</p>
                        <div class="product-price">NIO ${p.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
